    <style>
        /* ============================================
           MOBILE-FIRST RESPONSIVE DESIGN
           ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #0969da;
            --primary-light: #54aeff;
            --primary-dark: #033d8b;
            --secondary: #1f6feb;
            
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-tertiary: #6e7681;
            
            --border: #30363d;
            
            --safe-area-inset-left: env(safe-area-inset-left, 0);
            --safe-area-inset-right: env(safe-area-inset-right, 0);
            --safe-area-inset-top: env(safe-area-inset-top, 0);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0);
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* ============================================
           HEADER
           ============================================ */

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: max(0.75rem, var(--safe-area-inset-top)) 1rem 0.75rem 1rem;
            padding-left: max(1rem, var(--safe-area-inset-left));
            padding-right: max(1rem, var(--safe-area-inset-right));
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            flex-shrink: 0;
            transition: color 0.3s;
        }

        .logo:hover {
            color: var(--primary-light);
        }

        nav {
            display: none;
            gap: 1rem;
            align-items: center;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            min-width: 44px;
            min-height: 44px;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            z-index: 999;
        }

        .mobile-menu.active {
            max-height: 400px;
        }

        .mobile-menu nav {
            display: flex !important;
            flex-direction: column;
            padding: 1rem;
            gap: 0.5rem;
        }

        .mobile-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.75rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .mobile-menu a:active {
            background: rgba(9, 105, 218, 0.1);
            color: var(--primary);
        }

        @media (min-width: 1024px) {
            nav {
                display: flex !important;
            }

            .menu-toggle {
                display: none !important;
            }

            .mobile-menu {
                display: none !important;
            }
        }

        /* ============================================
           CONTAINER & SECTIONS
           ============================================ */

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
            padding-left: max(1rem, var(--safe-area-inset-left));
            padding-right: max(1rem, var(--safe-area-inset-right));
        }

        @media (min-width: 768px) {
            .container {
                max-width: 768px;
                padding: 0 2rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 1024px;
            }
        }

        .section {
            padding: 3rem 0;
            position: relative;
            overflow: hidden;
        }

        .section-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-secondary);
            max-width: 100%;
            margin: -0.5rem 0 2rem 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ============================================
           HERO
           ============================================ */

        .hero {
            margin-top: 70px;
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            position: relative;
        }

        .hero::before,
        .hero::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.05;
        }

        .hero::before {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }

        .hero::after {
            width: 200px;
            height: 200px;
            background: var(--secondary);
            bottom: -50px;
            left: -50px;
        }

        .hero-content {
            z-index: 10;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(1.75rem, 6vw, 3rem);
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .hero p {
            max-width: 100%;
            margin: 0 0 2rem 0;
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            flex-direction: column;
        }

        @media (min-width: 640px) {
            .cta-buttons {
                flex-direction: row;
            }
        }

        .btn {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            justify-content: center;
            min-height: 44px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(9, 105, 218, 0.2);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(9, 105, 218, 0.15);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:active {
            background: rgba(9, 105, 218, 0.1);
        }

        @media (min-width: 640px) {
            .btn {
                flex: initial;
                min-width: 200px;
            }
        }

        /* ============================================
           PROJECTS GRID
           ============================================ */

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        @media (min-width: 640px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .project-card:active {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .project-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(9, 105, 218, 0.1), transparent);
            border-bottom: 1px solid var(--border);
        }

        .project-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .project-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .project-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .project-meta {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .project-metrics {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1rem;
            text-align: center;
            gap: 0.5rem;
        }

        .metric {
            flex: 1;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 0.25rem;
            word-break: break-word;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            background: rgba(9, 105, 218, 0.15);
            color: var(--primary);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(9, 105, 218, 0.3);
        }

        .project-links {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .project-link {
            flex: 1;
            padding: 0.75rem 0.5rem;
            background: rgba(9, 105, 218, 0.1);
            color: var(--primary);
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid rgba(9, 105, 218, 0.3);
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-link:active {
            background: var(--primary);
            color: white;
        }

        /* ============================================
           SKILLS
           ============================================ */

        .skills-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        @media (min-width: 640px) {
            .skills-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .skills-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .skill-category {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .skill-category:active {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .skill-category h3 {
            font-size: 0.95rem;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .skill-tag {
            background: rgba(9, 105, 218, 0.1);
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(9, 105, 218, 0.3);
        }

        /* ============================================
           STATS GRID
           ============================================ */

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1.5rem 1rem;
            border-radius: 12px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* ============================================
           CONTACT
           ============================================ */

        .contact-container {
            max-width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .social-link {

            height: 48px;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.2s;
            font-size: 1.1rem;
            border: 1px solid rgba(9, 105, 218
