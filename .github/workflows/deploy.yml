name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Validate HTML
        run: |
          npm install -g html-validator-cli
          html-validator index.html file-upload.html copy-paste.html

      - name: Optimize Images
        run: |
          npm install -g imagemin-cli imagemin-jpegtran imagemin-pngquant
          imagemin assets/images/* --out-dir=assets/images

      - name: Generate Sitemap
        run: |
          npm install -g sitemap-generator-cli
          sitemap-generator https://moekyawaung-micro.github.io/MOBILE-OPTIMIZED-PORTFOLIO-WEBSITE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy
        -pages@v2
